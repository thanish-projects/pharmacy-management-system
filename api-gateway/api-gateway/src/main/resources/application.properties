server.port=8080
spring.application.name=api-gateway

# ======================================================
# EUREKA CLIENT CONFIGURATION
# ======================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ======================================================
# GATEWAY ROUTES
# ======================================================

# 1. Auth Service Route (Open Access - No Filter)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# 2. Inventory Service Route (Secured)
spring.cloud.gateway.routes[1].id=inventory-service
spring.cloud.gateway.routes[1].uri=lb://INVENTORY-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/drugs/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

# 3. Supplier Service Route (Secured)
spring.cloud.gateway.routes[2].id=supplier-service
spring.cloud.gateway.routes[2].uri=lb://SUPPLIER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/suppliers/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

# 4. Order Service Route (Secured)
spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/orders/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

# ======================================================
# SWAGGER DOC ROUTES (for aggregation in gateway UI)
# ======================================================

spring.cloud.gateway.routes[4].id=auth-service-docs
spring.cloud.gateway.routes[4].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/v3/api-docs/auth-service
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/v3/api-docs/auth-service,/v3/api-docs

spring.cloud.gateway.routes[5].id=inventory-service-docs
spring.cloud.gateway.routes[5].uri=lb://INVENTORY-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/v3/api-docs/inventory-service
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/v3/api-docs/inventory-service,/v3/api-docs

spring.cloud.gateway.routes[6].id=supplier-service-docs
spring.cloud.gateway.routes[6].uri=lb://SUPPLIER-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/v3/api-docs/supplier-service
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/v3/api-docs/supplier-service,/v3/api-docs

spring.cloud.gateway.routes[7].id=order-service-docs
spring.cloud.gateway.routes[7].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/v3/api-docs/order-service
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/v3/api-docs/order-service,/v3/api-docs

spring.cloud.gateway.routes[8].id=report-service-docs
spring.cloud.gateway.routes[8].uri=lb://REPORT-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/v3/api-docs/report-service
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/v3/api-docs/report-service,/v3/api-docs

spring.cloud.gateway.routes[9].id=report-service
spring.cloud.gateway.routes[9].uri=lb://REPORT-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/reports/**
spring.cloud.gateway.routes[9].filters[0]=AuthenticationFilter

# ======================================================
# SWAGGER AGGREGATION CONFIG
# ======================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/v3/api-docs/auth-service

springdoc.swagger-ui.urls[1].name=Inventory Service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/inventory-service

springdoc.swagger-ui.urls[2].name=Supplier Service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/supplier-service

springdoc.swagger-ui.urls[3].name=Order Service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/order-service

springdoc.swagger-ui.urls[4].name=Report Service
springdoc.swagger-ui.urls[4].url=/v3/api-docs/report-service

# ======================================================
# ADDITIONAL GATEWAY SETTINGS
# ======================================================
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

