server.port=8082
# Tell Spring which database to connect to
spring.datasource.url=jdbc:mysql://localhost:3306/pharmacydb

# Your MySQL credentials
spring.datasource.username=root
spring.datasource.password=root123

# MySQL driver class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA settings
# update = automatically creates/updates tables based on your Java classes
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console so you can see what JPA is doing behind the scenes
spring.jpa.show-sql=true

# Tell JPA we're using MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.application.name=inventory-service

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# Swagger UI path
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
